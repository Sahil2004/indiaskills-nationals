info:
  name: Get Statistics Result
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/statistics?metrics=song&labels=Rock"
  params:
    - name: metrics
      value: song
      type: query
    - name: labels
      value: Rock
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
